<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>RoChat Settings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f6f7fb;
            color: #222;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 16px;
        }

        h2 {
            margin-top: 0;
        }

        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        select,
        input,
        textarea,
        button {
            font-size: 14px;
        }

        select,
        input[type="text"] {
            padding: 6px 8px;
            border: 1px solid #d0d5dd;
            border-radius: 6px;
            min-width: 220px;
        }

        textarea {
            width: 100%;
            min-height: 520px;
            resize: vertical;
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            padding: 10px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            line-height: 1.4;
            box-sizing: border-box;
        }

        button {
            padding: 6px 12px;
            border: 1px solid #d0d5dd;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
        }

        button.primary {
            background: #2563eb;
            border-color: #2563eb;
            color: #fff;
        }

        .hint {
            color: #667085;
            font-size: 13px;
            margin: 6px 0 10px;
        }

        #status {
            min-height: 20px;
            font-size: 13px;
        }

        #file-tree {
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            padding: 8px;
            max-height: 260px;
            overflow: auto;
            background: #fafbfc;
            margin-bottom: 10px;
        }

        .tree-root,
        .tree-root ul {
            list-style: none;
            margin: 0;
            padding-left: 16px;
        }

        .tree-folder {
            margin: 2px 0;
        }

        .tree-folder>summary {
            cursor: pointer;
            color: #344054;
            user-select: none;
        }

        .tree-file-btn {
            border: none;
            background: transparent;
            color: #1d2939;
            padding: 2px 4px;
            text-align: left;
            border-radius: 4px;
        }

        .tree-file-btn:hover {
            background: #eef2ff;
        }

        .tree-file-btn.active {
            background: #dbeafe;
            color: #1d4ed8;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>系统配置编辑</h2>
        <div id="dir-label" class="hint">目录: 加载中...</div>

        <div class="row">
            <label for="dir-select">目录:</label>
            <select id="dir-select"></select>
        </div>

        <div class="row">
            <label for="file-select">文件:</label>
            <select id="file-select"></select>
            <button id="reload-btn">刷新列表</button>
        </div>
        <div id="file-tree"></div>

        <div class="row">
            <label for="new-file-input">新建文件:</label>
            <input id="new-file-input" type="text" placeholder="subdir/example.yaml|csv|md">
            <button id="new-file-btn">新建并编辑</button>
        </div>

        <textarea id="editor" placeholder="请选择一个配置文件（yaml/csv/md）"></textarea>

        <div class="row" style="margin-top: 10px;">
            <button class="primary" id="save-btn">保存</button>
        </div>
        <div id="status"></div>
    </div>

    <script>
        const dirSelect = document.getElementById('dir-select');
        const fileSelect = document.getElementById('file-select');
        const fileTree = document.getElementById('file-tree');
        const editor = document.getElementById('editor');
        const statusEl = document.getElementById('status');
        const dirLabel = document.getElementById('dir-label');

        let currentDirKey = '';
        let currentFile = '';

        function setStatus(text, isError = false) {
            statusEl.textContent = text;
            statusEl.style.color = isError ? '#b42318' : '#067647';
        }

        function validEditableFileName(name) {
            const normalized = name.trim().replace(/\\/g, '/');
            if (!normalized || normalized.startsWith('/')) return false;
            if (!/\.(?:ya?ml|csv|md)$/i.test(normalized)) return false;
            const parts = normalized.split('/');
            return parts.every((part) => part && part !== '.' && part !== '..');
        }

        function buildTree(paths) {
            const root = {};
            paths.forEach((fullPath) => {
                const parts = fullPath.split('/').filter(Boolean);
                let node = root;
                parts.forEach((part, idx) => {
                    const isLeaf = idx === parts.length - 1;
                    if (isLeaf) {
                        node[part] = { __file: true, __path: fullPath };
                    } else {
                        node[part] = node[part] || {};
                        node = node[part];
                    }
                });
            });
            return root;
        }

        function renderTreeNode(node, selectedPath) {
            const ul = document.createElement('ul');
            const entries = Object.entries(node).sort(([aName, aVal], [bName, bVal]) => {
                const aFile = !!aVal.__file;
                const bFile = !!bVal.__file;
                if (aFile !== bFile) return aFile ? 1 : -1; // 文件夹在前
                return aName.localeCompare(bName, 'zh-CN');
            });

            entries.forEach(([name, value]) => {
                const li = document.createElement('li');
                if (value.__file) {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'tree-file-btn';
                    if (value.__path === selectedPath) btn.classList.add('active');
                    btn.textContent = name;
                    btn.onclick = async () => {
                        fileSelect.value = value.__path;
                        currentFile = value.__path;
                        await loadCurrentFile();
                        renderFileTree(
                            Array.from(fileSelect.options).map((o) => o.value),
                            currentFile
                        );
                    };
                    li.appendChild(btn);
                } else {
                    const details = document.createElement('details');
                    details.className = 'tree-folder';
                    const summary = document.createElement('summary');
                    summary.textContent = name;
                    details.appendChild(summary);
                    details.appendChild(renderTreeNode(value, selectedPath));
                    if (selectedPath && selectedPath.startsWith(`${name}/`)) {
                        details.open = true;
                    }
                    li.appendChild(details);
                }
                ul.appendChild(li);
            });
            return ul;
        }

        function renderFileTree(files, selectedPath = '') {
            fileTree.innerHTML = '';
            if (!Array.isArray(files) || files.length === 0) {
                fileTree.textContent = '当前目录没有支持的配置文件（yaml/csv/md）。';
                return;
            }
            const tree = buildTree(files);
            const root = renderTreeNode(tree, selectedPath);
            root.classList.add('tree-root');
            fileTree.appendChild(root);
        }

        async function loadFileList(keepCurrent = true) {
            setStatus('加载文件列表...');
            const query = currentDirKey ? `?dir_key=${encodeURIComponent(currentDirKey)}` : '';
            const res = await fetch(`/api/settings/files${query}`);
            const data = await res.json();
            const old = keepCurrent ? currentFile : '';
            const oldDirKey = currentDirKey;
            fileSelect.innerHTML = '';
            dirSelect.innerHTML = '';

            const dirs = Array.isArray(data.directories) ? data.directories : [];
            dirs.forEach((d) => {
                const opt = document.createElement('option');
                opt.value = d.key;
                opt.textContent = d.path;
                dirSelect.appendChild(opt);
            });

            if (data.current_dir_key) {
                currentDirKey = data.current_dir_key;
                dirSelect.value = currentDirKey;
            } else {
                currentDirKey = dirSelect.value || '';
            }

            dirLabel.textContent = `目录: ${data.current_directory || '-'}`;

            if (!Array.isArray(data.files) || data.files.length === 0) {
                currentFile = '';
                editor.value = '';
                setStatus('当前目录没有支持的配置文件（yaml/csv/md）。');
                renderFileTree([]);
                return;
            }

            data.files.forEach((f) => {
                const opt = document.createElement('option');
                opt.value = f;
                opt.textContent = f;
                fileSelect.appendChild(opt);
            });

            if (keepCurrent && oldDirKey === currentDirKey && old && data.files.includes(old)) {
                fileSelect.value = old;
            }
            currentFile = fileSelect.value;
            renderFileTree(data.files, currentFile);
            await loadCurrentFile();
        }

        async function loadCurrentFile() {
            const name = fileSelect.value;
            if (!name) return;
            currentFile = name;
            setStatus(`正在加载 ${name}...`);

            const query = `name=${encodeURIComponent(name)}&dir_key=${encodeURIComponent(currentDirKey)}`;
            const res = await fetch(`/api/settings/file?${query}`);
            const data = await res.json();
            if (!res.ok || data.status === 'error') {
                setStatus(data.message || '加载失败', true);
                return;
            }
            editor.value = data.content || '';
            setStatus(`已加载 ${name}`);
            renderFileTree(Array.from(fileSelect.options).map((o) => o.value), currentFile);
        }

        async function saveCurrentFile() {
            if (!currentFile) {
                setStatus('请先选择文件', true);
                return;
            }
            setStatus(`正在保存 ${currentFile}...`);
            const formData = new FormData();
            formData.append('dir_key', currentDirKey);
            formData.append('name', currentFile);
            formData.append('content', editor.value);
            const res = await fetch('/api/settings/file', {
                method: 'POST',
                body: formData,
            });
            const data = await res.json();
            if (!res.ok || data.status === 'error') {
                setStatus(data.message || '保存失败', true);
                return;
            }
            setStatus(`保存成功: ${currentFile}`);
        }

        function createNewFile() {
            const input = document.getElementById('new-file-input');
            const name = input.value.trim().replace(/\\/g, '/');
            if (!validEditableFileName(name)) {
                setStatus('路径不合法，仅允许相对路径，且扩展名为 yaml/csv/md', true);
                return;
            }
            currentFile = name;
            const opt = Array.from(fileSelect.options).find((o) => o.value === name);
            if (!opt) {
                const newOpt = document.createElement('option');
                newOpt.value = name;
                newOpt.textContent = name;
                fileSelect.appendChild(newOpt);
            }
            fileSelect.value = name;
            if (/\.csv$/i.test(name)) {
                editor.value = 'column1,column2\n';
            } else if (/\.md$/i.test(name)) {
                editor.value = '# new markdown\n';
            } else {
                editor.value = '# new yaml\n';
            }
            setStatus(`已新建草稿: ${name}，请点击保存`);
            renderFileTree(Array.from(fileSelect.options).map((o) => o.value), currentFile);
        }

        document.getElementById('reload-btn').onclick = () => loadFileList(true);
        document.getElementById('save-btn').onclick = saveCurrentFile;
        document.getElementById('new-file-btn').onclick = createNewFile;
        fileSelect.onchange = loadCurrentFile;
        dirSelect.onchange = async () => {
            currentDirKey = dirSelect.value;
            await loadFileList(false);
        };

        loadFileList(false).catch((e) => setStatus(`初始化失败: ${e}`, true));
    </script>
</body>

</html>
