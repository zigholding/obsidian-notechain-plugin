<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界模型与仿真动画对比</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        .diagram-container {
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            background-color: white;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 1000px;
        }
        .svg-box {
            stroke-width: 2px;
            rx: 10;
        }
        .box-title {
            font-size: 18px;
            font-weight: 700;
        }
        .agent-text {
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body onload="setupScene()">

    <div class="diagram-container">
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">
            决策前预演对比：仿真世界 vs 世界模型
        </h1>

        <div class="flex justify-center mb-6">
            <button id="startButton" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition duration-300" onclick="animateComparison()">
                🚀 开始对比 (动作：左走一步)
            </button>
        </div>

        <svg id="comparisonSVG" width="100%" height="550" viewBox="0 0 1000 550" xmlns="http://www.w3.org/2000/svg">
            <!-- SVG Definitions -->
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
                </marker>
            </defs>

            <!-- =========================== Shared Scene (Agent, Pit, Goal) =========================== -->

            <!-- Ground/Map -->
            <rect x="50" y="450" width="900" height="50" fill="#a0522d" rx="5"/>
            <rect x="50" y="450" width="900" height="5" fill="#8b4513"/> 

            <!-- Pit (Reward -10) -->
            <rect x="150" y="450" width="100" height="50" fill="#2d2d2d" rx="0"/>
            <text x="200" y="440" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="600">坑 (-10)</text>
            <text x="850" y="440" text-anchor="middle" font-size="14" fill="#10b981" font-weight="600">目标 (+10)</text>
            <rect x="800" y="400" width="100" height="50" fill="#10b981" opacity="0.1" rx="5"/>
            
            <!-- Agent Start Position (s) -->
            <g id="agentStart" transform="translate(490, 420)">
                <!-- Head -->
                <circle cx="0" cy="0" r="10" fill="#3b82f6"/>
                <!-- Body -->
                <line x1="0" y1="10" x2="0" y2="30" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
                <!-- Legs -->
                <line x1="0" y1="30" x2="-8" y2="45" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
                <line x1="0" y1="30" x2="8" y2="45" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
            </g>
            <text x="500" y="390" text-anchor="middle" class="agent-text" fill="#3b82f6">智能体 (s)</text>

            <!-- =========================== 1. External Simulation (Left) =========================== -->

            <!-- Box -->
            <rect x="50" y="50" width="450" height="350" fill="#ecfdf5" stroke="#047857" class="svg-box"/>
            <text x="275" y="75" text-anchor="middle" class="box-title" fill="#047857">1. 外部仿真世界 (Simulation)</text>
            <text x="275" y="100" text-anchor="middle" font-size="12" fill="#047857">（高保真、精确渲染、计算量大）</text>
            <text x="275" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#047857">计算规则：人类编码的物理引擎</text>
            
            <!-- Simulation Inner Scene -->
            <rect x="100" y="160" width="350" height="150" fill="#e0f2f1" rx="5" stroke="#047857" stroke-dasharray="5,5"/>
            <rect x="150" y="310" width="250" height="10" fill="#a0522d" rx="2"/>
            <rect x="250" y="310" width="50" height="10" fill="#2d2d2d" rx="0"/>
            <text x="275" y="300" font-size="10" fill="#2d2d2d">模拟环境</text>

            <!-- Agent in Sim -->
            <g id="simAgent" transform="translate(350, 270)" style="visibility:hidden">
                <circle cx="0" cy="0" r="8" fill="#3b82f6"/>
                <line x1="0" y1="8" x2="0" y2="24" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
                <line x1="0" y1="24" x2="-6" y2="36" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
                <line x1="0" y1="24" x2="6" y2="36" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
            </g>
            <text id="simTimer" x="275" y="350" text-anchor="middle" font-size="18" font-weight="bold" fill="#047857">准备中...</text>
            
            <!-- Result Box -->
            <rect id="simResultBox" x="150" y="365" width="250" height="30" fill="#fef2f2" stroke="#dc2626" rx="5" style="visibility:hidden"/>
            <text id="simResultText" x="275" y="385" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="bold"></text>
            <text id="simTimeTaken" x="275" y="415" text-anchor="middle" font-size="12" fill="#6b7280"></text>


            <!-- =========================== 2. Internal World Model (Right) =========================== -->

            <!-- Box -->
            <rect x="550" y="50" width="400" height="350" fill="#f3e8ff" stroke="#7e22ce" class="svg-box"/>
            <text x="750" y="75" text-anchor="middle" class="box-title" fill="#7e22ce">2. AI 内部世界模型 (World Model)</text>
            <text x="750" y="100" text-anchor="middle" font-size="12" fill="#7e22ce">（低维度、抽象预测、效率极高）</text>
            <text x="750" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#7e22ce">学习规则：智能体观察数据归纳</text>

            <!-- Latent Space/Abstract Prediction -->
            <rect x="600" y="160" width="300" height="150" fill="#e9d5ff" rx="5" stroke="#7e22ce" stroke-dasharray="5,5"/>
            <text x="750" y="235" text-anchor="middle" font-size="14" fill="#7e22ce">潜在空间 (Latent Space) 预测 $s' \mid s, a$</text>

            <!-- Agent Icon in WM (Abstract) -->
            <rect id="wmAgent" x="800" y="200" width="20" height="20" fill="#3b82f6" rx="4" style="visibility:hidden"/>
            <text id="wmTimer" x="750" y="350" text-anchor="middle" font-size="18" font-weight="bold" fill="#7e22ce">准备中...</text>

            <!-- Result Box -->
            <rect id="wmResultBox" x="650" y="365" width="200" height="30" fill="#fef2f2" stroke="#dc2626" rx="5" style="visibility:hidden"/>
            <text id="wmResultText" x="750" y="385" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="bold"></text>
            <text id="wmTimeTaken" x="750" y="415" text-anchor="middle" font-size="12" fill="#6b7280"></text>
        </svg>
    </div>

    <script>
        const svg = document.getElementById('comparisonSVG');
        const startButton = document.getElementById('startButton');
        
        // Simulation elements
        const simAgent = document.getElementById('simAgent');
        const simTimer = document.getElementById('simTimer');
        const simResultBox = document.getElementById('simResultBox');
        const simResultText = document.getElementById('simResultText');
        const simTimeTaken = document.getElementById('simTimeTaken');

        // World Model elements
        const wmAgent = document.getElementById('wmAgent');
        const wmTimer = document.getElementById('wmTimer');
        const wmResultBox = document.getElementById('wmResultBox');
        const wmResultText = document.getElementById('wmResultText');
        const wmTimeTaken = document.getElementById('wmTimeTaken');

        // Animation Time Constants
        const SIM_TIME = 3500; // 3.5 seconds for external sim
        const WM_TIME = 1000;  // 1.0 second for internal WM

        function setupScene() {
            // Initial reset for clarity
            simAgent.style.visibility = 'hidden';
            wmAgent.style.visibility = 'hidden';
            simResultBox.style.visibility = 'hidden';
            wmResultBox.style.visibility = 'hidden';
            simResultText.textContent = '';
            wmResultText.textContent = '';
            simTimeTaken.textContent = '';
            wmTimeTaken.textContent = '';
            simTimer.textContent = '外部仿真等待指令';
            wmTimer.textContent = '内部模型等待指令';
            startButton.disabled = false;
        }

        function animateComparison() {
            startButton.disabled = true;
            setupScene(); 
            
            // --- 1. External Simulation (Slow & Detailed) ---
            
            setTimeout(() => {
                simAgent.style.visibility = 'visible';
                simTimer.textContent = '正在高保真渲染...';
                
                // Animation of the agent moving (detailed fall into the pit)
                simAgent.style.transition = `transform ${SIM_TIME}ms ease-in`;
                // Target is pit location (150-250 range, 320 Y for falling)
                simAgent.setAttribute('transform', 'translate(200, 320)'); 

                setTimeout(() => {
                    simTimer.textContent = '预测完成';
                    simResultBox.style.visibility = 'visible';
                    simResultText.textContent = '预测奖励: -10 (掉入坑中)';
                    simTimeTaken.textContent = `耗时: ${SIM_TIME / 1000} 秒`;
                    
                    // Reset agent position after result is shown
                    simAgent.style.transition = 'none';
                    simAgent.setAttribute('transform', 'translate(350, 270)');
                    simAgent.style.visibility = 'hidden';
                    
                }, SIM_TIME);
                
            }, 500); // Start simulation after 0.5s initial delay

            // --- 2. Internal World Model (Fast & Abstract) ---

            setTimeout(() => {
                wmAgent.style.visibility = 'visible';
                wmTimer.textContent = '正在潜在空间规划...';
                
                // Animation of the agent moving (fast, abstract movement)
                wmAgent.style.transition = `transform ${WM_TIME}ms linear`;
                // Target is pit location in the latent space (fast abstract change)
                wmAgent.setAttribute('x', '650');

                setTimeout(() => {
                    wmTimer.textContent = '预测完成';
                    wmResultBox.style.visibility = 'visible';
                    wmResultText.textContent = '预测奖励: -10 (抽象状态变化)';
                    wmTimeTaken.textContent = `耗时: ${WM_TIME / 1000} 秒`;

                    // Reset agent position after result is shown
                    wmAgent.style.transition = 'none';
                    wmAgent.setAttribute('x', '800');
                    wmAgent.style.visibility = 'hidden';

                    // Re-enable button
                    startButton.disabled = false;

                }, WM_TIME);

            }, 500); // Start WM after 0.5s initial delay
        }
    </script>
</body>
</html>
